    "sections": [
      {
        "title": "1. Qui nous sommes",
        "blocks": [
          {
            "type": "p",
            "html": "La présente Politique de confidentialité explique comment Biblia Crux (« App », « nous », « notre ») collecte, utilise, partage, protège et conserve les données personnelles des utilisateurs à l’échelle mondiale, conformément aux lois applicables en matière de protection des données."
          }
        ]
      },
      {
        "title": "2. Champ d’application de cette Politique",
        "blocks": [
          {
            "type": "p",
            "html": "Cette Politique s’applique à l’utilisation de l’App Biblia Crux, notamment:"
          },
          {
            "type": "ul",
            "items": [
              "l’utilisation sans compte;",
              "l’utilisation avec un compte (e-mail/mot de passe et connexion sociale, lorsqu’elle est disponible);",
              "la synchronisation/sauvegarde dans le cloud;",
              "les abonnements premium;",
              "les annonces dans la version gratuite;",
              "les signalements de correction de verset envoyés connecté;",
              "les fonctionnalités en ligne et hors ligne de l’App."
            ]
          },
          {
            "type": "p",
            "html": "If you use third-party services integrated with the App, those third parties’ terms and policies also apply."
          }
        ]
      },
      {
        "title": "3. Consent and acceptance",
        "blocks": [
          {
            "type": "p",
            "html": "By installing, accessing, or using the App, you state that you have read and agree to this Policy."
          },
          {
            "type": "p",
            "html": "If you (or your legal guardian, where applicable) do not agree with this Policy, do not install or use the App."
          }
        ]
      },
      {
        "title": "4. App audience (ages 13 and older)",
        "blocks": [
          {
            "type": "p",
            "html": "L’App propose du contenu biblique et est destinée aux personnes âgées de 13 ans et plus, y compris les adolescents et les adultes."
          },
          {
            "type": "p",
            "html": "We recommend parental or legal guardian supervision for adolescents who are minors. Where required by local law, we adopt additional measures to protect minors."
          },
          {
            "type": "p",
            "html": "If you are a legal guardian and identify misuse of a minor’s data, contact us at: {{emailLink}}."
          }
        ]
      },
      {
        "title": "5. What data we process",
        "blocks": [
          {
            "type": "p",
            "html": "Depending on how the App is used, we may process:"
          },
          {
            "type": "h3",
            "html": "5.1 Account and authentication data"
          },
          {
            "type": "ul",
            "items": [

              "identifiant utilisateur (UID);",
              "données de base du fournisseur de connexion (ex.: Google ou Apple), le cas échéant."
            ]
          },
          {
            "type": "h3",
            "html": "5.2 Usage and preference data"
          },
          {
            "type": "ul",
            "items": [
              "interface language;",
              "theme, font size/family, reading preferences;",
              "settings state and technical metadata required for operation."
            ]
          },
          {
            "type": "h3",
            "html": "5.3 Saved/synced content"

          {
            "type": "ul",
            "items": [
              "saved bookmarks and references;",
              "settings synced across devices;",
              "active session metadata for account protection across multiple devices."
            ]
          },
          {
            "type": "h3",
            "html": "5.4 Subscription data"
          },
          {
            "type": "ul",
            "items": [
              "premium status (active/inactive);",
              "technical subscription data processed by the store/RevenueCat."
            ]
          },

            "type": "h3",
            "html": "5.5 Advertising data (free version)"

            "type": "ul",

            "html": "5.7 Commentaires et signalements de correction de verset"

            "type": "p",
            "html": "We do not intentionally request sensitive personal data beyond what is strictly necessary to operate the Services."

            "items": [

              "authentifier les utilisateurs et protéger les sessions;",

              "fournir et gérer l’abonnement premium;",

    "sections": [
      {
        "title": "1. Chi siamo",
        "blocks": [
          {
            "type": "p",
            "html": "La presente Informativa sulla privacy spiega come Biblia Crux (“App”, “noi”, “nostro”) raccoglie, utilizza, condivide, protegge e conserva i dati personali degli utenti a livello globale, in conformità alle leggi applicabili sulla protezione dei dati."
          }
        ]
      },
      {
        "title": "2. Scope of this Policy",
        "blocks": [
          {
            "type": "p",
            "html": "This Policy applies to the use of the Biblia Crux App, including:"
          },
          {
            "type": "ul",
            "items": [
              "uso senza account;",
              "uso con account (e-mail/password e login social, quando disponibile);",
              "sincronizzazione/backup cloud;",
              "abbonamenti premium;",
              "annunci nella versione gratuita;",
              "segnalazioni di correzione dei versetti inviate con accesso effettuato;",
              "funzionalità online e offline dell’App."
            ]
          },
          {
            "type": "p",
            "html": "If you use third-party services integrated with the App, those third parties’ terms and policies also apply."
          }
        ]
      },
      {
        "title": "3. Consent and acceptance",
        "blocks": [
          {
            "type": "p",
            "html": "By installing, accessing, or using the App, you state that you have read and agree to this Policy."
          },
          {
            "type": "p",
            "html": "If you (or your legal guardian, where applicable) do not agree with this Policy, do not install or use the App."
          }
        ]
      },
      {
        "title": "4. Pubblico dell’App (13 anni o più)",
        "blocks": [
          {
            "type": "p",
            "html": "L’App offre contenuti biblici ed è destinata a persone di 13 anni o più, inclusi adolescenti e adulti."
          },
          {
            "type": "p",
            "html": "Raccomandiamo la supervisione di genitori o tutori legali per gli adolescenti minorenni. Quando richiesto dalla legge locale, adottiamo misure aggiuntive di protezione dei minori."
          },
          {
            "type": "p",
            "html": "If you are a legal guardian and identify misuse of a minor’s data, contact us at: {{emailLink}}."
          }
        ]
      },
      {
        "title": "5. What data we process",
        "blocks": [
          {
            "type": "p",
            "html": "Depending on how the App is used, we may process:"
          },
          {
            "type": "h3",
            "html": "5.1 Account and authentication data"
          },
          {
            "type": "ul",
            "items": [
              "e-mail;",
              "identificativo utente (UID);",
              "dati di base del provider di accesso (es.: Google o Apple), quando applicabile."
            ]
          },
          {
            "type": "h3",
            "html": "5.2 Usage and preference data"
          },
          {
            "type": "ul",
            "items": [
              "interface language;",
              "theme, font size/family, reading preferences;",
              "settings state and technical metadata required for operation."
            ]
          },
          {
            "type": "h3",
            "html": "5.3 Saved/synced content"
          },
          {
            "type": "ul",
            "items": [
              "saved bookmarks and references;",
              "settings synced across devices;",
              "active session metadata for account protection across multiple devices."
            ]
          },
          {
            "type": "h3",
            "html": "5.4 Subscription data"
          },
          {
            "type": "ul",
            "items": [
              "premium status (active/inactive);",
              "technical subscription data processed by the store/RevenueCat."
            ]
          },
          {
            "type": "h3",
            "html": "5.5 Advertising data (free version)"
          },
          {
            "type": "ul",
            "items": [
              "data required to display and measure ads (AdMob);",
              "privacy consent preferences/statuses (UMP), when applicable."
            ]
          },
          {
            "type": "h3",
            "html": "5.6 Technical and security data"
          },
          {
            "type": "ul",
            "items": [
              "technical logs, failures, connectivity events, and anti-abuse validations (e.g., App Check);",
              "IP address and technical identifiers may be processed by infrastructure providers."
            ]
          },
          {
            "type": "h3",
            "html": "5.7 Commenti e segnalazioni di correzione dei versetti"
          },
          {
            "type": "ul",
            "items": [
              "testo di commenti o suggerimenti di correzione sui versetti biblici inviati con accesso effettuato;",
              "riferimento del versetto, versione della Bibbia e metadati tecnici necessari all’elaborazione;",
              "non raccogliamo intenzionalmente categorie sensibili oltre a quanto scrivi nella segnalazione."
            ]
          },
          {
            "type": "p",
            "html": "We do not intentionally request sensitive personal data beyond what is strictly necessary to operate the Services."
          }
        ]
      },
      {
        "title": "6. Purposes of processing",
        "blocks": [
          {
            "type": "p",
            "html": "We process data to:"
          },
          {
            "type": "ul",
            "items": [
              "gestire l’App e fornire funzionalità;",
              "autenticare gli utenti e proteggere le sessioni;",
              "sincronizzare backup/ripristino tra dispositivi;",
              "fornire e gestire l’abbonamento premium;",
              "mostrare annunci nella versione gratuita;",
              "esaminare le segnalazioni di correzione dei versetti e migliorare la qualità del testo biblico;",
              "adempiere obblighi legali/regolatori;",
              "prevenire frodi, abusi e accessi non autorizzati;",
              "migliorare stabilità, sicurezza e prestazioni."
            ]
          }
        ]
      },
      {
        "title": "7. Legal bases for processing (LGPD/GDPR and equivalents)",
        "blocks": [
          {
            "type": "p",
            "html": "Where applicable, we process data based on:"
          },
          {
            "type": "ul",
            "items": [
              "contract performance (App features);",
              "legitimate interest (security, fraud prevention, technical maintenance, quality review of reports);",
              "consent (when required for advertising/privacy);",
              "compliance with legal/regulatory obligations."
            ]
          }
        ]
      },
      {
        "title": "8. Ads, consent, and preferences (AdMob/UMP)",
        "blocks": [
          {
            "type": "p",
            "html": "The free version may display ads."
          },
          {
            "type": "p",
            "html": "Where applicable by region, we use Google’s consent flow (UMP). The format and availability of options may vary by country/state."
          },
          {
            "type": "ul",
            "items": [
              "Premium users, under the App’s rules, should not receive ads.",
              "Even without consent for personalization, non-personalized/limited ads may be displayed when permitted by law and the advertising platform.",
              "You can review/change preferences through the privacy entry point inside the App."
            ]
          },
          {
            "type": "p",
            "html": "{{officialReference}} {{umpLink}}"
          }
        ]
      },
      {
        "title": "9. Sharing with third parties (operators and essential partners)",
        "blocks": [
          {
            "type": "p",
            "html": "We may share data with providers that enable the App to operate, for example:"
          },
          {
            "type": "ul",
            "items": [
              "Google Firebase (autenticazione, database cloud, functions, sicurezza);",
              "Google AdMob / UMP (pubblicità e gestione privacy);",
              "RevenueCat (gestione abbonamenti);",
              "Google Play e Apple App Store (acquisto e fatturazione);",
              "fornitori di infrastruttura, archiviazione e supporto tecnico."
            ]
          },
          {
            "type": "p",
            "html": "These third parties process data according to their own policies and terms."
          }
        ]
      },
      {
        "title": "10. International transfers",
        "blocks": [
          {
            "type": "p",
            "html": "If you are outside the country where the systems are hosted, your data may be processed in other jurisdictions."
          },
          {
            "type": "p",
            "html": "We adopt reasonable safeguards for international data transfers, in accordance with applicable law."
          }
        ]
      },
      {
        "title": "11. Retention and disposal",
        "blocks": [
          {
            "type": "p",
            "html": "We retain data for as long as necessary to:"
          },
          {
            "type": "ul",
            "items": [
              "deliver App functionality;",
              "comply with legal, accounting, and security obligations;",
              "prevent fraud and resolve disputes."
            ]
          },
          {
            "type": "p",
            "html": "In particular:"
          },
          {
            "type": "ul",
            "items": [
              "<strong>Backup cloud e sessione attiva:</strong> conservati finché l’account esiste; eliminati automaticamente dai nostri server poco dopo l’eliminazione dell’account nell’App.",
              "<strong>Segnalazioni di correzione dei versetti:</strong> possono essere conservate dopo l’eliminazione dell’account per revisionare e migliorare il testo biblico; non restano collegate a un account attivo. Possiamo <strong>rimuoverle manualmente dai nostri sistemi entro un massimo di 5 anni</strong> dall’ultimo aggiornamento.",
              "<strong>Log tecnici e registri degli store:</strong> conservati per periodi limitati per sicurezza, operazioni o obblighi legali/finanziari."
            ]
          },
          {
            "type": "p",
            "html": "Where possible and applicable, other data is deleted, anonymized, or minimized after it is no longer necessary."
          }
        ]
      },
      {
        "title": "12. Your privacy rights",
        "blocks": [
          {
            "type": "p",
            "html": "Depending on your region (e.g., LGPD, GDPR, CCPA/CPRA, VCDPA), you may have the right to:"
          },
          {
            "type": "ul",
            "items": [
              "confirm and access data;",
              "correct incomplete/inaccurate data;",
              "request deletion;",
              "request anonymization/blocking/restriction;",
              "request portability;",
              "object to certain processing;",
              "withdraw consent (when this is the legal basis);",
              "request review of automated decisions, where applicable;",
              "file a complaint with the competent authority."
            ]
          },
          {
            "type": "p",
            "html": "Per esercitare i diritti: {{emailLink}}<br>{{suggestedSubject}} “Richiesta di Dati Personali — Biblia Crux”"
          },
          {
            "type": "p",
            "html": "We may request proof of identity before fulfilling the request."
          }
        ]
      },
      {
        "title": "13. Eliminazione dell’account e dei dati",
        "blocks": [
          {
            "type": "p",
            "html": "Puoi eliminare l’account nell’App in <strong>Account</strong> → <strong>Elimina account</strong> (dopo l’accesso). Se non riesci ad accedere all’App, invia un’e-mail a {{emailLink}} con oggetto “Richiesta Eliminazione Account — Biblia Crux”."
          },
          {
            "type": "ol",
            "items": [
              "Apri <strong>Biblia Crux</strong>.",
              "Vai su <strong>Account</strong>.",
              "Accedi, se necessario.",
              "Tocca <strong>Elimina account</strong> e conferma."
            ]
          },
          {
            "type": "p",
            "html": "Quando elimini l’account:"
          },
          {
            "type": "ul",
            "items": [
              "l’account di autenticazione viene rimosso in modo permanente;",
              "i dati locali collegati alla sessione sul dispositivo vengono cancellati;",
              "il backup cloud delle preferenze e il record della sessione attiva vengono eliminati automaticamente dai nostri server."
            ]
          },
          {
            "type": "p",
            "html": "Quanto segue può essere conservato per periodi limitati:"
          },
          {
            "type": "ul",
            "items": [
              "segnalazioni di correzione dei versetti inviate (non collegate a un account attivo; rimozione manuale entro un massimo di 5 anni dall’ultimo aggiornamento, come nella sezione 11);",
              "dati richiesti da legge, sicurezza, prevenzione frodi o gestione contenziosi;",
              "registri di acquisto/abbonamento detenuti dagli store o richiesti dalla legge."
            ]
          },
          {
            "type": "p",
            "html": "Eliminare l’account <strong>non annulla</strong> un abbonamento a pagamento. Annullalo su <strong>Google Play</strong> o sull’<strong>App Store</strong>, a seconda del caso."
          },
          {
            "type": "p",
            "html": "Maggiori dettagli: {{accountDeletionLink}}."
          }
        ]
      },
      {
        "title": "14. Information security",
        "blocks": [
          {
            "type": "p",
            "html": "We adopt reasonable technical and organizational measures to reduce the risk of unauthorized access, improper alteration, disclosure, or destruction of data."
          },
          {
            "type": "p",
            "html": "No transmission/storage method is 100% invulnerable, but we apply proportionate security and monitoring controls."
          }
        ]
      },
      {
        "title": "15. Cookies and similar technologies",
        "blocks": [
          {
            "type": "p",
            "html": "In web components and/or integrated SDKs, we may use technologies such as cookies, device identifiers, tags, scripts, and local storage for:"
          },
          {
            "type": "ul",
            "items": [
              "authentication and session;",
              "performance measurement;",
              "security;",
              "fraud prevention;",
              "usage analysis;",
              "advertising (when applicable)."
            ]
          },
          {
            "type": "p",
            "html": "You can limit tracking and personalization through device/platform settings."
          }
        ]
      },
      {
        "title": "16. Notes for residents of specific regions (summary)",
        "blocks": [
          {
            "type": "h3",
            "html": "16.1 Brazil (LGPD)"
          },
          {
            "type": "p",
            "html": "Legal basis, purpose, necessity, security, and data subject rights are observed under the LGPD. Requests may be sent to the contact in this Policy."
          },
          {
            "type": "h3",
            "html": "16.2 EEA/United Kingdom/Switzerland (GDPR/UK GDPR)"
          },
          {
            "type": "p",
            "html": "You may exercise the rights provided in arts. 15 to 22 of the GDPR/UK GDPR, as applicable."
          },
          {
            "type": "h3",
            "html": "16.3 California (CCPA/CPRA) and Virginia (VCDPA)"
          },
          {
            "type": "p",
            "html": "Eligible users may exercise rights of access, deletion, correction, opt-out of certain purposes, and non-discrimination, according to local law."
          }
        ]
      },
      {
        "title": "17. Third-party services and links",
        "blocks": [
          {
            "type": "p",
            "html": "The App may contain third-party links/integrations. We do not fully control those environments and recommend reading each provider’s own policies."
          }
        ]
      },
      {
        "title": "18. Changes to this Policy",
        "blocks": [
          {
            "type": "p",
            "html": "We may update this Policy periodically."
          },
          {
            "type": "p",
            "html": "The version in force will always be the most recent version published through the official channel indicated in the App/store. For relevant changes, we may highlight a notice in the App."
          }
        ]
      },
      {
        "title": "19. Contact and complaints",
        "blocks": [
          {
            "type": "p",
            "html": "For questions, rights requests, or privacy complaints:"
          },
          {
            "type": "p",
            "className": "contact",
            "html": "{{emailLabel}} {{emailLink}}"
          },
          {
            "type": "p",
            "html": "If you are not satisfied with our response, you may contact the competent data protection authority in your jurisdiction."
          }
        ]
      }
    ]
  },

    const languageNameKeys = {
      en: "languageEnglish",
      pt: "languagePortuguese",
      es: "languageSpanish",
      fr: "languageFrench",
      it: "languageItalian",
      tl: "languageTagalog"
    };
    const appendixUrls = {
      googlePrivacy: "https://policies.google.com/privacy",
      firebase: "https://firebase.google.com/support/privacy",
      revenueCat: "https://www.revenuecat.com/privacy",
      googlePlay: "https://play.google.com/about/play-terms/",
      appStore: "https://www.apple.com/legal/internet-services/itunes/",
      accountDeletion: "https://enterprisedigitexum-oss.github.io/Biblia-Crux/account-deletion/"
    };
    const els = {
      pageTitle: document.getElementById("pageTitle"),
      effectiveDateLabel: document.getElementById("effectiveDateLabel"),
      effectiveDate: document.getElementById("effectiveDate"),
      lastUpdatedLabel: document.getElementById("lastUpdatedLabel"),
      lastUpdated: document.getElementById("lastUpdated"),
      applicationLabel: document.getElementById("applicationLabel"),
      applicationName: document.getElementById("applicationName"),
      privacyContactLabel: document.getElementById("privacyContactLabel"),
      settingsTitle: document.getElementById("settingsTitle"),
      languageSelectLabel: document.getElementById("languageSelectLabel"),
      languageSelect: document.getElementById("languageSelect"),
      policyContent: document.getElementById("policyContent"),
      appendixTitle: document.getElementById("appendixTitle"),
      appendixLinks: document.getElementById("appendixLinks")
    };
    let uiLocale = getInitialLocale();
    function getInitialLocale() {
      const stored = localStorage.getItem(storageKey);
      if (supportedLocales.includes(stored)) return stored;
      return defaultLocale;
    }
    function t(key) {
      return translations[uiLocale]?.[key] ?? translations.en[key] ?? key;
    }
    function localizedLanguageName(localeCode) {
      const key = languageNameKeys[localeCode];
      return key ? t(key) : localeCode;
    }
    function interpolate(html) {
      const emailLink = '<a href="mailto:enterprisedigitexum@gmail.com">enterprisedigitexum@gmail.com</a>';
      const umpLink = '<a href="https://developers.google.com/admob/android/privacy" target="_blank" rel="noopener noreferrer">Google AdMob UMP</a>';
      const accountDeletionLink = '<a href="' + appendixUrls.accountDeletion + '" target="_blank" rel="noopener noreferrer">' + (translations[uiLocale]?.links?.accountDeletion ?? translations.en.links.accountDeletion) + '</a>';
      return html
        .replaceAll("{{emailLink}}", emailLink)
        .replaceAll("{{officialReference}}", t("officialReferenceLabel"))
        .replaceAll("{{suggestedSubject}}", t("suggestedSubjectLabel"))
        .replaceAll("{{emailLabel}}", t("emailLabel"))
        .replaceAll("{{umpLink}}", umpLink)
        .replaceAll("{{accountDeletionLink}}", accountDeletionLink);
    }
    function renderLanguageOptions() {
      els.languageSelect.innerHTML = "";
      supportedLocales.forEach((localeCode) => {
        const option = document.createElement("option");
        option.value = localeCode;
        option.textContent = localizedLanguageName(localeCode);
        option.selected = localeCode === uiLocale;
        els.languageSelect.appendChild(option);
      });
    }
    function renderBlocks(blocks, parent) {
      blocks.forEach((block) => {
        if (block.type === "p") {
          const p = document.createElement("p");
          if (block.className) p.className = block.className;
          p.innerHTML = interpolate(block.html);
          parent.appendChild(p);
          return;
        }
        if (block.type === "h3") {
          const h3 = document.createElement("h3");
          h3.innerHTML = interpolate(block.html);
          parent.appendChild(h3);
          return;
        }
        if (block.type === "ul" || block.type === "ol") {
          const list = document.createElement(block.type);
          block.items.forEach((item) => {
            const li = document.createElement("li");
            li.innerHTML = interpolate(item);
            list.appendChild(li);
          });
          parent.appendChild(list);
        }
      });
    }
    function renderPolicyContent() {
      els.policyContent.innerHTML = "";
      const localeSections = translations[uiLocale]?.sections ?? translations.en.sections;
      localeSections.forEach((section) => {
        const sectionElement = document.createElement("section");
        const h2 = document.createElement("h2");
        h2.textContent = section.title;
        sectionElement.appendChild(h2);
        renderBlocks(section.blocks, sectionElement);
        els.policyContent.appendChild(sectionElement);
      });
    }
    function renderAppendix() {
      els.appendixTitle.textContent = t("appendixTitle");
      els.appendixLinks.innerHTML = "";
      const labels = translations[uiLocale]?.links ?? translations.en.links;
      Object.entries(appendixUrls).forEach(([key, url]) => {
        const li = document.createElement("li");
        const link = document.createElement("a");
        link.href = url;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = labels[key] || key;
        li.appendChild(link);
        els.appendixLinks.appendChild(li);
      });
    }
    function render() {
      document.documentElement.lang = t("htmlLang");
      document.title = t("documentTitle");
      const description = document.querySelector('meta[name="description"]');
      if (description) description.setAttribute("content", t("metaDescription"));
      els.pageTitle.textContent = t("pageTitle");
      els.effectiveDateLabel.textContent = t("effectiveDateLabel");
      els.effectiveDate.textContent = t("effectiveDate");
      els.lastUpdatedLabel.textContent = t("lastUpdatedLabel");
      els.lastUpdated.textContent = t("lastUpdated");
      els.applicationLabel.textContent = t("applicationLabel");
      els.applicationName.textContent = t("applicationName");
      els.privacyContactLabel.textContent = t("privacyContactLabel");
      els.settingsTitle.textContent = t("settingsTitle");
      els.languageSelectLabel.textContent = t("labelAppLanguage");
      els.languageSelect.setAttribute("aria-label", t("labelAppLanguage"));
      renderLanguageOptions();
      renderPolicyContent();
      renderAppendix();
    }
    els.languageSelect.addEventListener("change", (event) => {
      uiLocale = event.target.value;
      localStorage.setItem(storageKey, uiLocale);
      render();
    });
    render();
  </script>
