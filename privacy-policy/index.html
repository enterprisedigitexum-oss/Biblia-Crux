            ]
          },
          {
            "type": "h3",
            "html": "5.3 Saved/synced content"
          },
          {
            "type": "ul",
            "items": [
              "saved bookmarks and references;",
              "settings synced across devices;",
              "active session metadata for account protection across multiple devices."

            "type": "h3",
            "html": "5.4 Subscription data"
          },
          {
            "type": "ul",
            "items": [

            "type": "h3",
            "html": "5.5 Advertising data (free version)"

          {
            "type": "ul",
            "items": [
              "data required to display and measure ads (AdMob);",
              "privacy consent preferences/statuses (UMP), when applicable."

            "type": "h3",
            "html": "5.6 Technical and security data"
          },
          {
            "type": "ul",
            "items": [

            "type": "p",
            "html": "We do not intentionally request sensitive personal data beyond what is strictly necessary to operate the Services."
          }
        ]
      },
      {
        "title": "6. Purposes of processing",
        "blocks": [
          {
            "type": "p",
            "html": "We process data to:"
          },
          {
            "type": "ul",
            "items": [
              "operate the App and deliver features;",
              "authenticate users and protect sessions;",
              "sync backup/restore across devices;",
              "provide and manage premium subscriptions;",
              "display ads in the free version;",
              "comply with legal/regulatory obligations;",
              "prevent fraud, abuse, and unauthorized access;",
              "improve stability, security, and performance."

          }
        ]
      },
      {
        "title": "7. Legal bases for processing (LGPD/GDPR and equivalents)",
        "blocks": [
          {
            "type": "p",
            "html": "Where applicable, we process data based on:"
          },
          {
            "type": "ul",
            "items": [

              "consent (when required for advertising/privacy);",
              "compliance with legal/regulatory obligations."

          }
        ]
      },

        "title": "8. Ads, consent, and preferences (AdMob/UMP)",

            "type": "p",

            "type": "p",

            "type": "ul",

        "title": "9. Sharing with third parties (operators and essential partners)",
        "blocks": [
          {
            "type": "p",
            "html": "We may share data with providers that enable the App to operate, for example:"

            "type": "ul",

            "type": "p",
            "html": "These third parties process data according to their own policies and terms."

        "title": "10. International transfers",
        "blocks": [

            "html": "If you are outside the country where the systems are hosted, your data may be processed in other jurisdictions."

          {
            "type": "p",
            "html": "We adopt reasonable safeguards for international data transfers, in accordance with applicable law."
          }

      },
      {
        "title": "11. Retention and disposal",
        "blocks": [
          {
            "type": "p",
            "html": "We retain data for as long as necessary to:"

          {
            "type": "ul",

              "comply with legal, accounting, and security obligations;",
              "prevent fraud and resolve disputes."

          {
            "type": "p",
            "html": "Where possible and applicable, data is deleted, anonymized, or minimized after it is no longer necessary."

        "title": "12. Your privacy rights",
        "blocks": [
          {
            "type": "p",
            "html": "Depending on your region (e.g., LGPD, GDPR, CCPA/CPRA, VCDPA), you may have the right to:"

              "correct incomplete/inaccurate data;",
              "request deletion;",
              "request anonymization/blocking/restriction;",

              "object to certain processing;",
              "withdraw consent (when this is the legal basis);",
              "request review of automated decisions, where applicable;",
              "file a complaint with the competent authority."

            "type": "p",
            "html": "To exercise rights: {{emailLink}}<br>{{suggestedSubject}} “Personal Data Request — Biblia Crux”"

            "type": "p",
            "html": "We may request proof of identity before fulfilling the request."

      {
        "title": "13. Account and data deletion",

            "type": "p",
            "html": "When available in the App, you may request/perform account deletion."
          },
          {
            "type": "p",
            "html": "Some data may be retained for a limited period for:"

            "type": "ul",
            "items": [
              "legal obligation;",
              "security;",
              "fraud prevention;",
              "defense in judicial/administrative proceedings."
            ]
          }
        ]

        "title": "14. Information security",
        "blocks": [
          {
            "type": "p",
            "html": "We adopt reasonable technical and organizational measures to reduce the risk of unauthorized access, improper alteration, disclosure, or destruction of data."
          },
          {
            "type": "p",
            "html": "No transmission/storage method is 100% invulnerable, but we apply proportionate security and monitoring controls."

      },
      {
        "title": "15. Cookies and similar technologies",
        "blocks": [
          {
            "type": "p",
            "html": "In web components and/or integrated SDKs, we may use technologies such as cookies, device identifiers, tags, scripts, and local storage for:"

            "type": "ul",
            "items": [

              "security;",
              "fraud prevention;",
              "usage analysis;",
              "advertising (when applicable)."

            "html": "You can limit tracking and personalization through device/platform settings."
          }

      {
        "title": "16. Notes for residents of specific regions (summary)",
        "blocks": [
          {
            "type": "h3",
            "html": "16.1 Brazil (LGPD)"
          },
          {
            "type": "p",
            "html": "Legal basis, purpose, necessity, security, and data subject rights are observed under the LGPD. Requests may be sent to the contact in this Policy."

          {
            "type": "h3",
            "html": "16.2 EEA/United Kingdom/Switzerland (GDPR/UK GDPR)"

          {
            "type": "p",
            "html": "You may exercise the rights provided in arts. 15 to 22 of the GDPR/UK GDPR, as applicable."
          },
          {
            "type": "h3",
            "html": "16.3 California (CCPA/CPRA) and Virginia (VCDPA)"
          },
          {
            "type": "p",
            "html": "Eligible users may exercise rights of access, deletion, correction, opt-out of certain purposes, and non-discrimination, according to local law."
          }
        ]
      },
      {
        "title": "17. Third-party services and links",
        "blocks": [
          {
            "type": "p",
            "html": "The App may contain third-party links/integrations. We do not fully control those environments and recommend reading each provider’s own policies."
          }
        ]
      },
      {
        "title": "18. Changes to this Policy",
        "blocks": [
          {
            "type": "p",
            "html": "We may update this Policy periodically."

            "type": "p",
            "html": "The version in force will always be the most recent version published through the official channel indicated in the App/store. For relevant changes, we may highlight a notice in the App."

            "type": "p",
            "className": "contact",

    "sections": [
      {
        "title": "1. Quiénes somos",
        "blocks": [
          {
            "type": "p",
            "html": "La presente Política de Privacidad explica cómo Biblia Crux (“App”, “nosotros”, “nuestro”) recopila, utiliza, comparte, protege y conserva datos personales de usuarios a nivel global, de conformidad con las leyes aplicables de protección de datos."
          }
        ]
      },
      {
        "title": "2. Alcance de esta Política",
        "blocks": [
          {
            "type": "p",
            "html": "Esta Política se aplica al uso de la App Biblia Crux, incluyendo:"
          },
          {
            "type": "ul",
            "items": [
              "uso sin cuenta;",
              "uso con cuenta (correo/contraseña e inicio de sesión social, cuando esté disponible);",
              "sincronización/copia de seguridad en la nube;",
              "suscripciones premium;",
              "anuncios en la versión gratuita;",
              "recursos online y offline de la App."
            ]
          },
          {
            "type": "p",
            "html": "Si utilizas servicios de terceros integrados en la App, también se aplican los términos y políticas de esos terceros."
          }
        ]
      },
      {
        "title": "3. Consentimiento y aceptación",
        "blocks": [
          {
            "type": "p",
            "html": "Al instalar, acceder o usar la App, declaras que has leído y aceptas esta Política."
          },
          {
            "type": "p",
            "html": "Si tú (o tu representante legal, cuando corresponda) no estás de acuerdo con esta Política, no instales ni utilices la App."
          }
        ]
      },
      {
        "title": "4. Público de la App (13 años o más)",
        "blocks": [
          {
            "type": "p",
            "html": "La App ofrece contenido bíblico y está destinada a personas de 13 años o más, incluidos adolescentes y adultos."
          },
          {
            "type": "p",
            "html": "Recomendamos supervisión de padres o representantes legales para adolescentes menores de edad. Cuando lo exija la ley local, adoptamos medidas adicionales de protección a menores."
          },
          {
            "type": "p",
            "html": "Si eres representante legal e identificas un uso indebido de datos de un menor, ponte en contacto en: {{emailLink}}."
          }
        ]
      },
      {
        "title": "5. Qué datos tratamos",
        "blocks": [
          {
            "type": "p",
            "html": "Dependiendo de la forma de uso de la App, podemos tratar:"
          },
          {
            "type": "h3",
            "html": "5.1 Datos de cuenta y autenticación"
          },
          {
            "type": "ul",
            "items": [
              "correo electrónico;",
              "identificador de usuario (UID);",
              "datos básicos del proveedor de inicio de sesión (ej.: Google), cuando corresponda."
            ]
          },
          {
            "type": "h3",
            "html": "5.2 Datos de uso y preferencias"
          },
          {
            "type": "ul",
            "items": [
              "idioma de la interfaz;",
              "tema, tamaño/familia de fuente, preferencias de lectura;",
              "estado de configuraciones y metadatos técnicos necesarios para el funcionamiento."
            ]
          },
          {
            "type": "h3",
            "html": "5.3 Contenido guardado/sincronizado"
          },
          {
            "type": "ul",
            "items": [
              "marcadores y referencias guardadas;",
              "configuraciones sincronizadas entre dispositivos;",
              "metadatos de sesión activa para proteger la cuenta en múltiples dispositivos."
            ]
          },
          {
            "type": "h3",
            "html": "5.4 Datos de suscripción"
          },
          {
            "type": "ul",
            "items": [
              "estado premium (activo/inactivo);",
              "datos técnicos de suscripción procesados por tienda/RevenueCat."
            ]
          },
          {
            "type": "h3",
            "html": "5.5 Datos de anuncios (versión gratuita)"
          },
          {
            "type": "ul",
            "items": [
              "datos necesarios para la visualización y medición de anuncios (AdMob);",
              "preferencias/estados de consentimiento de privacidad (UMP), cuando corresponda."
            ]
          },
          {
            "type": "h3",
            "html": "5.6 Datos técnicos y de seguridad"
          },
          {
            "type": "ul",
            "items": [
              "registros técnicos, fallos, eventos de conectividad y validaciones antiabuso (ej.: App Check);",
              "la dirección IP y los identificadores técnicos pueden ser tratados por proveedores de infraestructura."
            ]
          },
          {
            "type": "p",
            "html": "No solicitamos intencionalmente datos personales sensibles más allá de lo estrictamente necesario para operar los Servicios."
          }
        ]
      },
      {
        "title": "6. Finalidades del tratamiento",
        "blocks": [
          {
            "type": "p",
            "html": "Tratamos datos para:"
          },
          {
            "type": "ul",
            "items": [
              "operar la App y entregar funcionalidades;",
              "autenticar usuarios y proteger sesiones;",
              "sincronizar copia de seguridad/restauración entre dispositivos;",
              "proveer y gestionar la suscripción premium;",
              "mostrar anuncios en la versión gratuita;",
              "cumplir obligaciones legales/regulatorias;",
              "prevenir fraude, abuso y acceso no autorizado;",
              "mejorar estabilidad, seguridad y rendimiento."
            ]
          }
        ]

        "title": "7. Bases legales de tratamiento (LGPD/GDPR y equivalentes)",

            "type": "p",
            "html": "Cuando corresponda, tratamos datos con base en:"

            "items": [

        "title": "10. Transferencias internacionales",

            "type": "p",
            "html": "Si estás fuera del país de alojamiento de los sistemas, tus datos pueden ser procesados en otras jurisdicciones."

            "type": "p",
            "html": "Adoptamos salvaguardas razonables para transferencias internacionales de datos, conforme a la legislación aplicable."

      },
      {
        "title": "11. Retención y descarte",
        "blocks": [
          {
            "type": "p",
            "html": "Conservamos datos durante el tiempo necesario para:"
          },
          {
            "type": "ul",
            "items": [

              "cumplir obligaciones legales, contables y de seguridad;",
              "prevenir fraude y resolver disputas."

            "html": "Cuando sea posible y aplicable, los datos se eliminan, anonimizan o minimizan después de dejar de ser necesarios."

        "title": "12. Tus derechos de privacidad",
        "blocks": [

            "type": "p",
            "html": "Dependiendo de tu región (ej.: LGPD, GDPR, CCPA/CPRA, VCDPA), puedes tener derecho a:"

        "blocks": [

            "html": "Adoptamos medidas técnicas y organizativas razonables para reducir el riesgo de acceso no autorizado, alteración indebida, divulgación o destrucción de datos."

            "type": "p",

        "title": "16. Notas para residentes de regiones específicas (resumen)",

            "type": "h3",

            "html": "Podemos actualizar esta Política periódicamente."

      {
        "title": "1. Sino kami",
        "blocks": [
          {
            "type": "p",
            "html": "Ipinapaliwanag ng Patakaran sa Privacy na ito kung paano kinokolekta, ginagamit, ibinabahagi, pinoprotektahan, at pinananatili ng Biblia Crux (“App”, “kami”, “amin”) ang personal na datos ng mga user sa pandaigdigang saklaw, alinsunod sa naaangkop na mga batas sa proteksyon ng datos."

      },
      {
        "title": "2. Saklaw ng Patakarang ito",
        "blocks": [
          {
            "type": "p",
            "html": "Nalalapat ang Patakarang ito sa paggamit ng Biblia Crux App, kabilang ang:"
          },
          {
            "type": "ul",
            "items": [
              "paggamit nang walang account;",
              "paggamit na may account (e-mail/password at social login, kapag available);",
              "cloud synchronization/backup;",
              "premium subscriptions;",
              "ads sa libreng bersyon;",
              "online at offline na resources ng App."

          },
          {
            "type": "p",
            "html": "Kung gagamit ka ng third-party services na integrated sa App, nalalapat din ang terms at policies ng mga third party na iyon."
          }
        ]
      },
      {
        "title": "3. Consent at pagtanggap",

            "type": "p",
            "html": "Sa pag-install, pag-access, o paggamit ng App, ipinapahayag mong nabasa mo at sumasang-ayon ka sa Patakarang ito."
          },

            "type": "p",
            "html": "Kung ikaw (o ang iyong legal guardian, kapag naaangkop) ay hindi sumasang-ayon sa Patakarang ito, huwag i-install o gamitin ang App."

        ]
      },
      {
        "title": "4. Audience ng App (edad 13 pataas)",

            "type": "p",

            "type": "p",
            "html": "Inirerekomenda namin ang paggabay ng mga magulang o legal guardians para sa paggamit ng mga bata at kabataan. Kapag hinihingi ng lokal na batas, nagsasagawa kami ng karagdagang hakbang upang protektahan ang mga menor de edad."

            "type": "p",
            "html": "Kung ikaw ay legal guardian at may natukoy na maling paggamit ng datos ng menor de edad, makipag-ugnayan sa: {{emailLink}}."

      {

            "html": "Depende sa paraan ng paggamit ng App, maaari naming iproseso ang:"

              "user identifier (UID);",
              "pangunahing datos mula sa login provider (hal.: Google), kapag naaangkop."

            "type": "h3",
            "html": "5.2 Datos ng paggamit at preferences"

            "type": "ul",

          },
          {
            "type": "p",
            "html": "Kung hindi ka nasiyahan sa aming sagot, maaari kang lumapit sa competent data protection authority sa iyong jurisdiction."
          }
        ]
      }
    ]
  }
};

    const languageNameKeys = {
      en: "languageEnglish",
      pt: "languagePortuguese",
      es: "languageSpanish",
      fr: "languageFrench",
      it: "languageItalian",
      tl: "languageTagalog"
    };

    const appendixUrls = {
      googlePrivacy: "https://policies.google.com/privacy",
      firebase: "https://firebase.google.com/support/privacy",
      revenueCat: "https://www.revenuecat.com/privacy",
      googlePlay: "https://play.google.com/about/play-terms/"
    };

    let uiLocale = getInitialLocale();

    const els = {
      pageTitle: document.getElementById("pageTitle"),
      effectiveDateLabel: document.getElementById("effectiveDateLabel"),
      effectiveDate: document.getElementById("effectiveDate"),
      lastUpdatedLabel: document.getElementById("lastUpdatedLabel"),
      lastUpdated: document.getElementById("lastUpdated"),
      applicationLabel: document.getElementById("applicationLabel"),
      applicationName: document.getElementById("applicationName"),
      privacyContactLabel: document.getElementById("privacyContactLabel"),
      settingsTitle: document.getElementById("settingsTitle"),
      languageSelectLabel: document.getElementById("languageSelectLabel"),
      languageSelect: document.getElementById("languageSelect"),
      policyContent: document.getElementById("policyContent"),
      appendixTitle: document.getElementById("appendixTitle"),
      appendixLinks: document.getElementById("appendixLinks")
    };

    function getInitialLocale() {
      const stored = localStorage.getItem(storageKey);
      if (supportedLocales.includes(stored)) return stored;

      return "en";
    }

    function t(key) {
      return translations[uiLocale]?.[key] ?? translations.en[key] ?? key;
    }

    function localizedLanguageName(localeCode) {
      const key = languageNameKeys[localeCode];
      return key ? t(key) : localeCode;
    }

    function interpolate(html) {
      const emailLink = '<a href="mailto:enterprisedigitexum@gmail.com">enterprisedigitexum@gmail.com</a>';
      const umpLink = '<a href="https://developers.google.com/admob/android/privacy?hl=pt-br" target="_blank" rel="noopener noreferrer">Google AdMob UMP (Android)</a>';

      return html
        .replaceAll("{{emailLink}}", emailLink)
        .replaceAll("{{officialReference}}", t("officialReferenceLabel"))
        .replaceAll("{{suggestedSubject}}", t("suggestedSubjectLabel"))
        .replaceAll("{{emailLabel}}", t("emailLabel"))
        .replaceAll("{{umpLink}}", umpLink);
    }

    function renderLanguageOptions() {
      els.languageSelect.innerHTML = "";

      supportedLocales.forEach((localeCode) => {
        const option = document.createElement("option");
        option.value = localeCode;
        option.textContent = localizedLanguageName(localeCode);
        option.selected = localeCode === uiLocale;
        els.languageSelect.appendChild(option);
      });
    }

    function renderBlocks(blocks, parent) {
      blocks.forEach((block) => {
        if (block.type === "p") {
          const p = document.createElement("p");
          if (block.className) p.className = block.className;
          p.innerHTML = interpolate(block.html);
          parent.appendChild(p);
          return;
        }

        if (block.type === "h3") {
          const h3 = document.createElement("h3");
          h3.innerHTML = interpolate(block.html);
          parent.appendChild(h3);
          return;
        }

        if (block.type === "ul") {
          const ul = document.createElement("ul");
          block.items.forEach((item) => {
            const li = document.createElement("li");
            li.innerHTML = interpolate(item);
            ul.appendChild(li);
          });
          parent.appendChild(ul);
        }
      });
    }

    function renderPolicyContent() {
      els.policyContent.innerHTML = "";

      const localeSections = translations[uiLocale]?.sections ?? translations.en.sections;

      localeSections.forEach((section) => {
        const sectionElement = document.createElement("section");
        const h2 = document.createElement("h2");
        h2.textContent = section.title;
        sectionElement.appendChild(h2);
        renderBlocks(section.blocks, sectionElement);
        els.policyContent.appendChild(sectionElement);
      });
    }

    function renderAppendix() {
      els.appendixTitle.textContent = t("appendixTitle");
      els.appendixLinks.innerHTML = "";

      const labels = translations[uiLocale]?.links ?? translations.en.links;

      Object.entries(appendixUrls).forEach(([key, url]) => {
        const li = document.createElement("li");
        const link = document.createElement("a");
        link.href = url;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = labels[key] || key;
        li.appendChild(link);
        els.appendixLinks.appendChild(li);
      });
    }

    function render() {
      document.documentElement.lang = t("htmlLang");
      document.title = t("documentTitle");

      const description = document.querySelector('meta[name="description"]');
      if (description) description.setAttribute("content", t("metaDescription"));

      els.pageTitle.textContent = t("pageTitle");
      els.effectiveDateLabel.textContent = t("effectiveDateLabel");
      els.effectiveDate.textContent = t("effectiveDate");
      els.lastUpdatedLabel.textContent = t("lastUpdatedLabel");
      els.lastUpdated.textContent = t("lastUpdated");
      els.applicationLabel.textContent = t("applicationLabel");
      els.applicationName.textContent = t("applicationName");
      els.privacyContactLabel.textContent = t("privacyContactLabel");
      els.settingsTitle.textContent = t("settingsTitle");
      els.languageSelectLabel.textContent = t("labelAppLanguage");
      els.languageSelect.setAttribute("aria-label", t("labelAppLanguage"));

      renderLanguageOptions();
      renderPolicyContent();
      renderAppendix();
    }

    els.languageSelect.addEventListener("change", (event) => {
      uiLocale = event.target.value;
      localStorage.setItem(storageKey, uiLocale);
      render();
    });

    render();
  </script>
</body>
</html>
