      margin-bottom: 28px;
      text-align: center;

      color: var(--accent);

      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--accent-dark);
      font-size: clamp(2.1rem, 6vw, 4rem);
      line-height: 1.08;
      letter-spacing: 0.02em;
    }

    .language-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    label {
      color: var(--muted);
      font-size: 0.98rem;
      font-weight: 650;
    }

    select {
      appearance: none;
      min-width: 245px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background:
        linear-gradient(45deg, transparent 50%, var(--accent) 50%),
        linear-gradient(135deg, var(--accent) 50%, transparent 50%),
        linear-gradient(to right, #fff, #fff);
      background-position:
        calc(100% - 22px) 50%,
        calc(100% - 16px) 50%,
        100% 0;
      background-size:
        6px 6px,
        6px 6px,
        2.8em 100%;
      background-repeat: no-repeat;
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
      padding: 12px 48px 12px 18px;
      outline: none;
      box-shadow: 0 8px 24px rgba(43, 33, 24, 0.06);
    }

    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(122, 47, 59, 0.12);
    }

    .content-card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(24px, 5vw, 52px);
      text-align: justify;
    }

    .section {
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
    }

    .section:first-child { padding-top: 0; }
    .section:last-child { border-bottom: 0; padding-bottom: 0; }

      margin: 0 0 16px;
      color: var(--accent-dark);
      font-size: clamp(1.35rem, 3.5vw, 2rem);
      line-height: 1.2;

    p {
      margin: 0 0 15px;
      font-size: clamp(1.03rem, 2.2vw, 1.16rem);
      text-align: justify;
      text-justify: inter-word;
      hyphens: auto;

    p:last-child { margin-bottom: 0; }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      color: var(--muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.9rem;

      .page {

        padding-top: 18px;

      .hero,
      .content-card {
        border-radius: 18px;
      }

      .language-panel {
        align-items: stretch;
        flex-direction: column;
      }

      select {
        width: 100%;
        min-width: 0;
      }
    }

</head>

    const languageLabels = {
      en: "Choose language",
      pt: "Escolha o idioma",
      fr: "Choisir la langue",
      it: "Scegli la lingua",
      es: "Elige el idioma",
      tl: "Pumili ng wika"
    };

    const htmlLangMap = {
      en: "en",
      pt: "pt-BR",
      fr: "fr",
      it: "it",
      es: "es",
      tl: "tl"
    };

    const languageSelect = document.getElementById("languageSelect");
    const pageTitle = document.getElementById("pageTitle");
    const languageLabel = document.getElementById("languageLabel");
    const aboutContent = document.getElementById("aboutContent");

    function createParagraph(text) {
      const paragraph = document.createElement("p");
      paragraph.textContent = text;
      return paragraph;
    }

    function renderAbout(languageCode) {
      const selectedLanguage = aboutData.languages[languageCode] || aboutData.languages[aboutData.defaultLanguage];

      document.documentElement.lang = htmlLangMap[languageCode] || languageCode;
      document.title = selectedLanguage.title;
      pageTitle.textContent = selectedLanguage.title;
      languageLabel.textContent = languageLabels[languageCode] || languageLabels.en;

      aboutContent.innerHTML = "";

      selectedLanguage.sections.forEach((section) => {
        const sectionElement = document.createElement("section");
        sectionElement.className = "section";
        sectionElement.id = section.id;

        const heading = document.createElement("h2");
        heading.textContent = section.title;
        sectionElement.appendChild(heading);

        section.paragraphs.forEach((paragraphText) => {
          sectionElement.appendChild(createParagraph(paragraphText));
        });

        aboutContent.appendChild(sectionElement);
      });
    }

    languageSelect.addEventListener("change", (event) => {
      renderAbout(event.target.value);
    });

    renderAbout("en");
  </script>
