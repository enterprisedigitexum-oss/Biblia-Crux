<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bible Verse Comments</title>

  <script src="data/bible-data-001.js"></script>
  <script src="data/bible-data-002.js"></script>
  <script src="data/bible-data-003.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 820px;
      margin: 24px auto;
      padding: 0 14px;
      line-height: 1.45;
      background: #fafafa;
      color: #222;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    p {
      color: #444;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    .required {
      color: #b00020;
      font-weight: bold;
    }

    .small-note {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
    }

    select,
    input,
    textarea,
    button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 5px;
      padding: 10px;
      font-size: 16px;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    #verseBox {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid #ccc;
      background: white;
      white-space: pre-wrap;
      border-radius: 6px;
    }

    #status {
      margin-top: 14px;
      font-weight: bold;
    }

    button {
      margin-top: 16px;
      cursor: pointer;
      background: #7f1d1d;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <h1 id="pageTitle"></h1>

  <p id="pageDescription"></p>

  <p class="small-note">
    <span class="required">*</span>
    <span id="requiredNote"></span>
  </p>

  <label for="email">
    <span id="emailLabel"></span>
    <span class="required">*</span>
  </label>
  <input id="email" type="email" required>

  <label id="languageLabel" for="language"></label>
  <select id="language"></select>

  <label id="bookLabel" for="book"></label>
  <select id="book"></select>

  <label id="chapterLabel" for="chapter"></label>
  <select id="chapter"></select>

  <label id="verseLabel" for="verse"></label>
  <select id="verse"></select>

  <div id="verseBox"></div>

  <label for="comment">
    <span id="commentLabel"></span>
    <span class="required">*</span>
  </label>
  <textarea id="comment" required></textarea>

  <button id="sendBtn" onclick="sendComment()"></button>

      version: "",

    if (window.BIBLE_CHUNKS && Array.isArray(window.BIBLE_CHUNKS)) {

        if (!BIBLE_DATA.version && chunk.version) {
          BIBLE_DATA.version = chunk.version;

      },
      tl: {

        languageLabel: "Wika ng salin",
        bookLabel: "Aklat",

        commentPlaceholder: "Isulat dito ang iyong mungkahi, pagwawasto, o obserbasyon...",
        sendButton: "Ipadala ang komento",
        loading: "Naglo-load...",
        sending: "Ipinapadala ang komento...",
        sent: "Matagumpay na naipadala ang komento.",
        emailRequired: "Ilagay muna ang iyong email bago ipadala.",
        emailInvalid: "Maglagay ng wastong email address.",
        commentRequired: "Sumulat muna ng komento bago ipadala.",
        invalidVerse: "Pumili ng wastong talata.",
        formNotConfigured: "Error: i-configure ang Google Forms URL sa HTML file.",
        sendError: "Nagkaroon ng error sa pagpapadala. Subukang muli.",
        dataError: "Hindi na-load nang tama ang datos ng Bibliya."
      }
    };

    let currentVerseData = null;

    function t(key) {
      const lang = getLanguage();
      return (UI_TEXTS[lang] && UI_TEXTS[lang][key]) || UI_TEXTS.en[key] || key;
    }

    function setStatus(message, isError = false) {
      const el = document.getElementById("status");
      el.textContent = message || "";
      el.style.color = isError ? "#b00020" : "#0a7a0a";
    }

    function applyLanguageToPage() {
      const lang = getLanguage();
      const texts = UI_TEXTS[lang] || UI_TEXTS.en;

      document.documentElement.lang = lang;
      document.title = texts.pageTitle;

      document.getElementById("pageTitle").textContent = texts.pageTitle;
      document.getElementById("pageDescription").textContent = texts.pageDescription;
      document.getElementById("requiredNote").textContent = texts.requiredNote;
      document.getElementById("emailLabel").textContent = texts.emailLabel;
      document.getElementById("email").placeholder = texts.emailPlaceholder;
      document.getElementById("languageLabel").textContent = texts.languageLabel;
      document.getElementById("bookLabel").textContent = texts.bookLabel;
      document.getElementById("chapterLabel").textContent = texts.chapterLabel;
      document.getElementById("verseLabel").textContent = texts.verseLabel;
      document.getElementById("commentLabel").textContent = texts.commentLabel;
      document.getElementById("comment").placeholder = texts.commentPlaceholder;
      document.getElementById("sendBtn").textContent = texts.sendButton;
    }

    function fillSelect(id, items, getValue, getLabel, selectedValue = null) {
      const select = document.getElementById(id);
      select.innerHTML = "";

      items.forEach(item => {
        const option = document.createElement("option");
        option.value = getValue(item);
        option.textContent = getLabel(item);

        if (selectedValue !== null && String(option.value) === String(selectedValue)) {
          option.selected = true;
        }

        select.appendChild(option);
      });
    }

    function getLanguage() {
      return document.getElementById("language").value || DEFAULT_LANGUAGE;
    }

    function getTranslatedLanguageName(code, interfaceLang) {
      const labels = LANGUAGE_LABELS_BY_INTERFACE[interfaceLang] || LANGUAGE_LABELS_BY_INTERFACE.en;
      return labels[code] || LANGUAGE_LABELS_BY_INTERFACE.en[code] || code;
    }

    function refreshLanguageOptions() {
      const currentLanguage = getLanguage();

      const languages = Object.keys(LANGUAGE_LABELS_BY_INTERFACE.en).map(code => ({
        code: code,
        label: getTranslatedLanguageName(code, currentLanguage)
      }));

      fillSelect(
        "language",
        languages,
        item => item.code,
        item => item.label,
        currentLanguage
      );
    }

    function getSelectedBook() {
      const bookId = Number(document.getElementById("book").value);
      return BIBLE_DATA.books.find(b => Number(b.book_id) === bookId);
    }

    function getSelectedChapter() {
      const book = getSelectedBook();
      const chapterNumber = Number(document.getElementById("chapter").value);
      return book.chapters.find(c => Number(c.chapter) === chapterNumber);
    }

    function getBookName(book, lang) {
      return book.titles[lang] || book.titles.en || book.titles.pt || book.book_key;
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function init() {
      document.getElementById("verseBox").textContent = UI_TEXTS[DEFAULT_LANGUAGE].loading;

      if (!BIBLE_DATA.books || BIBLE_DATA.books.length === 0) {
        setStatus(UI_TEXTS[DEFAULT_LANGUAGE].dataError, true);
        return;
      }

      const initialLanguages = Object.keys(LANGUAGE_LABELS_BY_INTERFACE.en).map(code => ({
        code: code,
        label: getTranslatedLanguageName(code, DEFAULT_LANGUAGE)
      }));

      fillSelect(
        "language",
        initialLanguages,
        item => item.code,
        item => item.label,
        DEFAULT_LANGUAGE
      );

      document.getElementById("language").addEventListener("change", () => {
        refreshLanguageOptions();
        applyLanguageToPage();
        loadBooks();
        setStatus("", false);
      });

      document.getElementById("book").addEventListener("change", loadChapters);
      document.getElementById("chapter").addEventListener("change", loadVerses);
      document.getElementById("verse").addEventListener("change", showVerseText);

      applyLanguageToPage();
      loadBooks();
    }

    function loadBooks() {
      const lang = getLanguage();

      fillSelect(
        "book",
        BIBLE_DATA.books,
        book => book.book_id,
        book => getBookName(book, lang)
      );

      loadChapters();
    }

    function loadChapters() {
      const book = getSelectedBook();

      fillSelect(
        "chapter",
        book.chapters,
        chapter => chapter.chapter,
        chapter => chapter.chapter
      );

      loadVerses();
    }

    function loadVerses() {
      const chapter = getSelectedChapter();

      fillSelect(
        "verse",
        chapter.verses,
        verse => verse.verse,
        verse => verse.verse
      );

      showVerseText();
    }

    function showVerseText() {
      const lang = getLanguage();
      const book = getSelectedBook();
      const chapter = getSelectedChapter();
      const verseNumber = Number(document.getElementById("verse").value);

      const verseObj = chapter.verses.find(v => Number(v.verse) === verseNumber);

      const bookName = getBookName(book, lang);
      const text = verseObj.texts[lang] || "";

      currentVerseData = {
        idioma: lang,
        book_id: book.book_id,
        book_key: book.book_key,
        book_name: bookName,
        chapter: chapter.chapter,
        verse: verseObj.verse,
        ref: `${bookName} ${chapter.chapter}:${verseObj.verse}`,
        text: text
      };

      document.getElementById("verseBox").textContent =
        `${currentVerseData.ref}\n\n${currentVerseData.text}`;
    }

    function sendComment() {
      const email = document.getElementById("email").value.trim();
      const comment = document.getElementById("comment").value.trim();

      if (!email) {
        setStatus(t("emailRequired"), true);
        return;
      }

      if (!isValidEmail(email)) {
        setStatus(t("emailInvalid"), true);
        return;
      }

      if (!comment) {
        setStatus(t("commentRequired"), true);
        return;
      }

      if (!currentVerseData) {
        setStatus(t("invalidVerse"), true);
        return;
      }

      if (FORM_ACTION_URL.includes("COLE_AQUI")) {
        setStatus(t("formNotConfigured"), true);
        return;
      }

      const formData = new FormData();

      formData.append(ENTRY_EMAIL, email);
      formData.append(ENTRY_IDIOMA, currentVerseData.idioma);
      formData.append(ENTRY_BOOK_ID, currentVerseData.book_id);
      formData.append(ENTRY_BOOK_KEY, currentVerseData.book_key);
      formData.append(ENTRY_BOOK_NAME, currentVerseData.book_name);
      formData.append(ENTRY_CHAPTER, currentVerseData.chapter);
      formData.append(ENTRY_VERSE, currentVerseData.verse);
      formData.append(ENTRY_REF, currentVerseData.ref);
      formData.append(ENTRY_TEXT, currentVerseData.text);
      formData.append(ENTRY_COMENTARIO, comment);

      const btn = document.getElementById("sendBtn");
      btn.disabled = true;
      setStatus(t("sending"), false);

      fetch(FORM_ACTION_URL, {
        method: "POST",
        mode: "no-cors",
        body: formData
      })
      .then(() => {
        document.getElementById("comment").value = "";
        setStatus(t("sent"), false);
      })
      .catch(() => {
        setStatus(t("sendError"), true);
      })
      .finally(() => {
        btn.disabled = false;
      });
    }

    init();
  </script>
</body>
</html>
